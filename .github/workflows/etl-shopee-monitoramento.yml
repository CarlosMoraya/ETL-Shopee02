name: ETL Shopee - Monitoramento (15 min)

on:
  schedule:
    # Roda a cada 15 minutos das 06h às 23h59 (horário de Brasília / UTC-3)
    # Não roda das 00h às 05h59 BRT (= 03h às 08h59 UTC)
    - cron: '*/15 0-2,9-23 * * *'
  workflow_dispatch:
    # Permite trigger manual

jobs:
  etl-shopee-monitoramento:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: ''  # Desabilitar cache

      - name: Limpar ambiente e instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y playwright selenium 2>/dev/null || true
          pip cache purge 2>/dev/null || true
          pip install --no-cache-dir -r requirements.txt
          echo "=== Dependências instaladas ==="
          pip list | grep -E "playwright|selenium|requests|pandas" || true

      - name: Rodar Pipeline ETL
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          # Cookies de autenticação Shopee
          SHOPEE_FMS_USER_SKEY: ${{ secrets.SHOPEE_FMS_USER_SKEY }}
          SHOPEE_SPX_UK: ${{ secrets.SHOPEE_SPX_UK }}
          SHOPEE_FMS_USER_ID: ${{ secrets.SHOPEE_FMS_USER_ID }}
          SHOPEE_FMS_DISPLAY_NAME: ${{ secrets.SHOPEE_FMS_DISPLAY_NAME }}
          SHOPEE_FMS_USER_AGENCY_ID: ${{ secrets.SHOPEE_FMS_USER_AGENCY_ID }}
          SHOPEE_SPX_AGID: ${{ secrets.SHOPEE_SPX_AGID }}
          SHOPEE_SPX_CID: ${{ secrets.SHOPEE_SPX_CID }}
          SHOPEE_SPX_DN: ${{ secrets.SHOPEE_SPX_DN }}
          SHOPEE_SPX_ST: ${{ secrets.SHOPEE_SPX_ST }}
          SHOPEE_SPX_UID: ${{ secrets.SHOPEE_SPX_UID }}
          SHOPEE_ADMIN_DEVICE_ID: ${{ secrets.SHOPEE_ADMIN_DEVICE_ID }}
          SHOPEE_ADMIN_LANG: ${{ secrets.SHOPEE_ADMIN_LANG }}
          SHOPEE_SSC_USER_ROLE: ${{ secrets.SHOPEE_SSC_USER_ROLE }}
        run: |
          python -m src.pipelines.shopee_monitoramento_pipeline

      - name: Upload de artifacts (em caso de erro)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: erro-crawler
          path: |
            data/raw/
          retention-days: 7
