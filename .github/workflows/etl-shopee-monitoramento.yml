name: ETL Shopee - Monitoramento (15 min)

on:
  schedule:
    # Roda a cada 15 minutos: 0, 15, 30, 45 de cada hora
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Permite trigger manual

jobs:
  etl-shopee-monitoramento:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: ''  # Desabilitar cache do pip

      - name: Limpar cache e instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip cache purge 2>/dev/null || true
          pip install --no-cache-dir -r requirements.txt

      - name: Rodar Pipeline ETL
        env:
          SHOPEE_EMAIL: ${{ secrets.SHOPEE_EMAIL }}
          SHOPEE_PWD: ${{ secrets.SHOPEE_PWD }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python -m src.pipelines.shopee_monitoramento_pipeline

      - name: Upload de artifacts (em caso de erro)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: erro-crawler
          path: |
            data/raw/
          retention-days: 7
