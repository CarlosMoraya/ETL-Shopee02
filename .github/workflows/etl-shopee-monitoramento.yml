name: ETL Shopee - Monitoramento (15 min)

on:
  schedule:
    # Roda a cada 15 minutos das 06h às 23h59 (horário de Brasília / UTC-3)
    # Não roda das 00h às 05h59 BRT (= 03h às 08h59 UTC)
    - cron: '*/15 0-2,9-23 * * *'
  workflow_dispatch:
    # Permite trigger manual

jobs:
  etl-shopee-monitoramento:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: ''  # Desabilitar cache

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          echo "=== Dependências instaladas ==="
          pip list | grep -E "playwright|requests|pandas" || true

      - name: Instalar browsers do Playwright
        run: |
          # Ubuntu 24.04 renomeou libasound2 -> libasound2t64
          sudo apt-get install -y libasound2t64 2>/dev/null || true
          playwright install chromium --with-deps

      - name: Rodar Pipeline ETL
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SHOPEE_EMAIL: ${{ secrets.SHOPEE_EMAIL }}
          SHOPEE_PWD: ${{ secrets.SHOPEE_PWD }}
        run: |
          python -m src.pipelines.shopee_monitoramento_pipeline

      - name: Upload de artifacts (em caso de erro)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: erro-crawler
          path: |
            data/raw/
          retention-days: 7
