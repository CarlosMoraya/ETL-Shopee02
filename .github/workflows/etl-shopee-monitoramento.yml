name: ETL Shopee - Monitoramento (15 min)

on:
  schedule:
    # Roda a cada 15 minutos: 0, 15, 30, 45 de cada hora
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Permite trigger manual

jobs:
  etl-shopee-monitoramento:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            libatspi2.0-0t64 \
            libglib2.0-0t64 \
            libxshmfence1 \
            libx11-xcb1 \
            libxcb1 \
            --no-install-recommends

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Playwright (sem dependências)
        run: |
          playwright install chromium --no-deps

      - name: Rodar Pipeline ETL
        env:
          SHOPEE_EMAIL: ${{ secrets.SHOPEE_EMAIL }}
          SHOPEE_PWD: ${{ secrets.SHOPEE_PWD }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          CRAWLER_HEADLESS: "true"
        run: |
          python -m src.pipelines.shopee_monitoramento_pipeline

      - name: Upload de artifacts (em caso de erro)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: erro-crawler
          path: |
            erro_*.png
            data/raw/
          retention-days: 7
