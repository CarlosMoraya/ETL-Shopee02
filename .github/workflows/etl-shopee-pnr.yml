name: ETL Shopee - Ticket PNR (Diário)

on:
  schedule:
    # Roda 2x ao dia: 12h00 BRT (= 15h UTC) e 18h00 BRT (= 21h UTC)
    - cron: '0 15,21 * * *'
  workflow_dispatch:

jobs:
  etl-shopee-pnr:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: ''

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Instalar browsers do Playwright
        run: |
          sudo apt-get install -y libasound2t64 2>/dev/null || true
          playwright install chromium --with-deps

      - name: Rodar Pipeline ETL
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SHOPEE_EMAIL: ${{ secrets.SHOPEE_EMAIL }}
          SHOPEE_PWD: ${{ secrets.SHOPEE_PWD }}
        run: |
          python -m src.pipelines.shopee_pnr_pipeline

      - name: Upload de artifacts (em caso de erro)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: erro-pnr
          path: data/raw/
          retention-days: 7
